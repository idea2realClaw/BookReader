name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # 允许 GITHUB_TOKEN 创建 Release（修复 403）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 缓存 Flet 的 Flutter / Android SDK，避免每次重新下载数 GB
      - name: Cache Flet SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet
          key: flet-sdk-${{ runner.os }}-0.85.3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}

      - name: Install Flet (pinned to 0.85.3)
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.85.3" Pillow

      - name: Build APK
        # --yes 触发 assume_yes，让 flet 自动安装 Flutter/Android SDK 而不弹交互提示
        run: |
          cd "${{ github.workspace }}"
          flet build apk \
            --project bookreader \
            --product "BookReader" \
            --org com.bookreader.app \
            --description "A simple and elegant eBook reader" \
            --build-number "${{ github.run_number }}" \
            --build-version "1.0.${{ github.run_number }}" \
            --skip-flutter-doctor \
            --yes

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bookreader-android-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: BookReader v1.0.${{ github.run_number }}
          body: |
            📱 BookReader Android APK 自动构建

            ## 安装方法
            1. 下载 `BookReader.apk`
            2. 在 Android 设备上允许"安装未知来源应用"
            3. 点击 APK 文件安装

            ## 更新日志
            - 自动构建自 commit `${{ github.sha }}`
            - 构建时间: ${{ github.event.head_commit.timestamp }}
          files: |
            build/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
