name: Build Android APK

on:
  push:
    branches: [ main, master, shared-architecture ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet Pillow

      - name: Build APK
        env:
          FLET_CLI_SKIP_FLUTTER_DOCTOR: "true"
        run: |
          cd ${{ github.workspace }}
          flet build apk \
            --project bookreader \
            --product "BookReader" \
            --org com.bookreader.app \
            --description "A simple and elegant eBook reader" \
            --build-number ${{ github.run_number }} \
            --build-version 1.0.${{ github.run_number }} \
            --yes

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bookreader-android-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: BookReader v1.0.${{ github.run_number }}
          body: |
            📱 BookReader Android APK 自动构建

            ## 安装方法
            1. 下载 `BookReader.apk`
            2. 在 Android 设备上允许"安装未知来源应用"
            3. 点击 APK 文件安装

            ## 更新日志
            - 自动构建自 commit `${{ github.sha }}`
            - 构建时间: ${{ github.event.head_commit.timestamp }}
          files: |
            build/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
