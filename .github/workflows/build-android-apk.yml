name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # 允许 GITHUB_TOKEN 创建 Release（修复 403）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 缓存 Flet 的 Flutter / Android SDK，避免每次重新下载数 GB
      - name: Cache Flet SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet
          key: flet-sdk-${{ runner.os }}-0.85.3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}

      - name: Install Flet (pinned to 0.85.3)
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.85.3" Pillow

      - name: Determine build version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bake version into source
        # 把 release 版本号写入 version.py，使 APK 内显示正确的版本
        run: |
          printf 'APP_VERSION = "%s"\n' "${{ steps.ver.outputs.version }}" > version.py
          echo "Baked APP_VERSION=${{ steps.ver.outputs.version }}"

      - name: Build APK
        # --yes 触发 assume_yes，让 flet 自动安装 Flutter/Android SDK 而不弹交互提示
        # assets/icon.png 和 assets/icon_android.png 会被 flet 自动识别为应用图标
        # flet_audio 的 dart 包打包机制（flet 0.85.3，经源码验证）：
        #   1. --source-packages flet_audio 设置 SERIOUS_PYTHON_ALLOW_SOURCE_DISTRIBUTIONS
        #   2. serious-python 对该包从 sdist（源码分发）安装，而非预编译 wheel
        #   3. sdist 包含 flutter/flet_audio/ dart 子目录（wheel 不含）
        #   4. serious-python 把 dart 子目录提取到 flutter-packages-temp/
        #   5. flet build 扫描 flutter-packages/，注册到 pubspec.yaml
        #   6. Flutter 构建时下载并编译 flet_audio dart 包 → 打包进 APK
        # 缺少 --source-packages → serious-python 用 wheel 安装 → 无 dart 子目录 →
        #   pubspec.yaml 无 flet_audio → APK 不含 dart 端 → service 注册失败 →
        #   play() 30秒超时 → 听不到声音（v1.0.30 的 APK 仍 68.63MB，与 v1.0.29 相同）
        # [tool.flet.flutter.dependencies] 在 flet 0.85.3 的 build_base.py 不直接读取，
        #   保留仅为文档兼容（未来版本可能读取）。
        # Android 权限通过 pyproject.toml 的 [tool.flet.android.permission] 声明。
        run: |
          cd "${{ github.workspace }}"
          flet build apk \
            --project bookreader \
            --product "BookReader" \
            --org com.bookreader.app \
            --description "A simple and elegant eBook reader" \
            --build-number "${{ github.run_number }}" \
            --build-version "${{ steps.ver.outputs.version }}" \
            --android-adaptive-icon-background "#1565C0" \
            --source-packages flet_audio \
            --skip-flutter-doctor \
            --yes

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bookreader-android-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BookReader ${{ github.ref_name }}
          body: |
            📱 BookReader Android APK 自动构建

            ## 安装方法
            1. 下载 `BookReader.apk`
            2. 在 Android 设备上允许"安装未知来源应用"
            3. 点击 APK 文件安装

            ## 更新日志
            - 自动构建自 commit `${{ github.sha }}`
            - 构建时间: ${{ github.event.head_commit.timestamp }}
          files: |
            build/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
