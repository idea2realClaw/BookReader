name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Flet CLI
      run: pip install flet==0.85.3
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Build APK (with expect)
      run: |
        # Install expect for auto-answering prompts
        sudo apt-get update -qq
        sudo apt-get install -y expect
        
        # Run flet build with expect to auto-answer "y"
        expect -c '
        set timeout -1
        spawn flet build apk \
          --project BookReader \
          --org com.bookreader \
          --description "跨平台电子书阅读器" \
          --product "BookReader" \
          --build-version "0.0.1" \
          --build-number "1" \
          --android-permissions "READ_EXTERNAL_STORAGE=true" \
          --android-permissions "WRITE_EXTERNAL_STORAGE=true"
        
        # Match any prompt asking for confirmation
        expect {
          -re "Proceed.*:" {
            send "y\r"
            exp_continue
          }
          -re "\\[y/n\\]" {
            send "y\r"
            exp_continue
          }
          eof
        }
        '
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BookReader-APK
        path: build/apk/*.apk
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
