name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # 允许 GITHUB_TOKEN 创建 Release（修复 403）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 缓存 Flet 的 Flutter / Android SDK，避免每次重新下载数 GB
      - name: Cache Flet SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet
          key: flet-sdk-${{ runner.os }}-0.85.3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}

      - name: Install Flet (pinned to 0.85.3)
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.85.3" Pillow

      - name: Determine build version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bake version into source
        # 把 release 版本号写入 version.py，使 APK 内显示正确的版本
        run: |
          printf 'APP_VERSION = "%s"\n' "${{ steps.ver.outputs.version }}" > version.py
          echo "Baked APP_VERSION=${{ steps.ver.outputs.version }}"

      - name: Build APK
        # --yes 触发 assume_yes，让 flet 自动安装 Flutter/Android SDK 而不弹交互提示
        # --verbose 让 flet build apk 输出详细日志（包括 serious-python 的 pip install 输出）
        # flet_audio dart 包打包机制：serious-python 安装 flet_audio wheel 后，
        # 扫描 site-packages/flutter/ 子目录，提取到 flutter-packages-temp/，
        # flet build 注册到 pubspec.yaml，Flutter 编译时下载 audioplayers 原生库。
        run: |
          cd "${{ github.workspace }}"
          flet build apk \
            --project bookreader \
            --product "BookReader" \
            --org com.bookreader.app \
            --description "A simple and elegant eBook reader" \
            --build-number "${{ github.run_number }}" \
            --build-version "${{ steps.ver.outputs.version }}" \
            --android-adaptive-icon-background "#1565C0" \
            --source-packages flet_audio \
            --skip-flutter-doctor \
            --verbose \
            --yes

      - name: Debug flutter packages
        # 调试：打印 serious-python 提取的 flutter-packages 目录和 pubspec.yaml
        # 同时写到 $GITHUB_STEP_SUMMARY（Actions 页面直接可见）
        if: always()
        run: |
          {
            echo "=== build/flutter-packages/ ==="
            ls -la build/flutter-packages/ 2>&1 || echo "(not found)"
            find build/flutter-packages/ -name "pubspec.yaml" 2>&1 || true
            echo ""
            echo "=== build/flutter/pubspec.yaml (full) ==="
            if [ -f build/flutter/pubspec.yaml ]; then
              cat build/flutter/pubspec.yaml
            else
              echo "(pubspec.yaml not found)"
            fi
            echo ""
            echo "=== build/site-packages/flutter/ ==="
            ls -la build/site-packages/flutter/ 2>&1 || echo "(not found - serious-python may not have installed flet_audio)"
            echo ""
            echo "=== pip list in site-packages ==="
            ls build/site-packages/ 2>&1 | grep -i "flet\|audio" || echo "(no flet/audio packages found)"
          } | tee debug_output.txt

          # 写到 step summary（Actions 页面直接可见）
          echo '## Debug Output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat debug_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug_output.txt
          retention-days: 7

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bookreader-android-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BookReader ${{ github.ref_name }}
          body: |
            📱 BookReader Android APK 自动构建

            ## 安装方法
            1. 下载 `BookReader.apk`
            2. 在 Android 设备上允许"安装未知来源应用"
            3. 点击 APK 文件安装

            ## 更新日志
            - 自动构建自 commit `${{ github.sha }}`
            - 构建时间: ${{ github.event.head_commit.timestamp }}
          files: |
            build/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
